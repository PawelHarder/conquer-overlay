      <div class="section-label">Filters</div>
      <div class="search-form">
        <div class="field-group">
          <div class="field-label">Item Name</div>
          <div class="autocomplete-wrap">
            <input type="text" id="watch-item" placeholder="e.g. DragonClaw, Phoenix Armor..." autocomplete="off" title="Item name to watch for on the market" />
            <div class="autocomplete-list" id="watch-autocomplete"></div>
          </div>
        </div>

        <div class="filter-grid-2">
          <div class="field-group">
            <div class="field-label">Category</div>
            <select id="watch-major" title="Filter watched listings by category">
              <option value="">Any Category</option>
            </select>
          </div>
          <div class="field-group">
            <div class="field-label">Minor Class</div>
            <select id="watch-minor" title="Filter watched listings by sub-type">
              <option value="">Any Minor Class</option>
            </select>
          </div>
        </div>

        <div class="filter-grid-3">
          <div class="field-group">
            <div class="field-label">Quality</div>
            <select id="watch-quality" title="Only alert for matches at this quality or above">
              <option value="">Any Quality</option>
            </select>
          </div>
          <div class="field-group">
            <div class="field-label">+Level</div>
            <div style="display:flex;gap:6px;align-items:center;">
              <select id="watch-plus" title="Only alert for items with this enchantment level" style="flex:1;">
                <option value="">Any Plus</option>
              </select>
              <label style="display:flex;align-items:center;gap:3px;font-size:11px;white-space:nowrap;cursor:pointer;" title="Alert for any enchanted item (+1 or above)">
                <input type="checkbox" id="watch-plus-any">Any+
              </label>
            </div>
          </div>
          <div class="field-group">
            <div class="field-label">Sockets</div>
            <select id="watch-sockets" title="Only alert for items with this socket count">
              <option value="">Any</option>
              <option value="0">No sockets</option>
              <option value="1">1 socket</option>
              <option value="2">2 sockets</option>
            </select>
          </div>
        </div>

        <div class="field-group" style="margin-bottom:8px;">
          <div class="field-label">Poll Interval</div>
          <select id="watch-interval" title="How often the market is checked for matching listings">
            <option value="10000">Every 10 sec</option>
            <option value="15000" selected>Every 15 sec</option>
            <option value="30000">Every 30 sec</option>
            <option value="60000">Every 1 min</option>
          </select>
        </div>

        <div class="section-label">Max Price</div>
        <div class="history-price-row">
          <div class="field-group">
            <div class="field-label">Basis</div>
            <select id="watch-price-basis" title="Set max price as a fixed value or a percentage below a historical reference">
              <option value="">Manual</option>
              <option value="lowest">% below Lowest</option>
              <option value="average">% below Average</option>
            </select>
          </div>
          <div class="field-group">
            <div class="field-label">%</div>
            <input type="number" id="watch-price-pct" placeholder="10" min="0" max="99" title="How many percent below the chosen baseline the max price should be set" />
          </div>
          <div class="field-group">
            <div class="field-label">&nbsp;</div>
            <button class="btn-primary" id="watch-use-history-btn" style="font-size:10px;padding:6px 8px;" title="Calculate max price from your saved price history using the chosen basis and percentage">Use History</button>
          </div>
        </div>
        <div class="price-input-wrap">
          <input type="text" id="watch-price" placeholder="Max price (gold)" autocomplete="off" title="Only alert when a matching item is listed at or below this price" />
          <span class="currency-hint">gold</span>
        </div>

        <div style="display:flex;justify-content:space-between;margin-top:6px;gap:6px;">
          <button class="btn-clear" id="watch-clear-listings" title="Clear current match results without stopping the watch">Clear Listings</button>
          <button class="btn-clear" id="watch-clear" title="Clear all watch filters and stop watching">Clear</button>
          <button class="btn-primary" id="watch-start-btn" title="Start or stop monitoring the market for matching listings">&#9654; Watch</button>
        </div>
      </div>

      <div class="section-label">Active Watch</div>
      <div class="watch-status">
        <div class="watch-dot" id="watch-dot"></div>
        <div class="watch-text" id="watch-text">No active watch</div>
      </div>

      <div class="section-label">Match History</div>
      <div class="listings-wrap">
      <div class="listings-header">
        <span data-sort="AttributeName">Item</span>
        <span data-sort="SellerName">Seller</span>
        <span data-sort="QualityName" style="text-align:center">Quality</span>
        <span data-sort="pos" style="text-align:center">Loc</span>
        <span data-sort="Price" style="text-align:right" class="sort-asc">Price</span>
      </div>
      <div id="watch-matches">
        <div class="placeholder-text">Matches will appear here</div>
      </div>
      </div>

      <div class="minimap-wrap">
        <canvas id="watch-minimap" width="240" height="160"></canvas>
      </div>
