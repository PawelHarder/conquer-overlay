      <div class="search-form">
        <div class="field-group">
          <div class="field-label">Item Name / Keyword</div>
          <div class="search-row">
            <div class="autocomplete-wrap" style="flex:1">
              <input type="text" id="search-input" placeholder="Search market..." autocomplete="off" title="Type item name or keyword to search the market" />
              <div class="autocomplete-list" id="search-autocomplete"></div>
            </div>
            <button class="btn-primary" id="search-btn" title="Fetch current market listings matching your filters">Search</button>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div class="field-group">
            <div class="field-label">Category</div>
            <select id="search-major" title="Filter by item category">
              <option value="">All Categories</option>
            </select>
          </div>
          <div class="field-group">
            <div class="field-label">Minor Class</div>
            <select id="search-minor" title="Filter by item sub-type within the selected category">
              <option value="">All Minor Classes</option>
            </select>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <div class="field-group">
            <div class="field-label">Quality</div>
            <select id="search-quality" title="Filter by item quality tier">
              <option value="">All Qualities</option>
            </select>
          </div>
          <div class="field-group">
            <div class="field-label">+Level</div>
            <div style="display:flex;gap:6px;align-items:center;">
              <select id="search-plus" title="Filter by enchantment plus level" style="flex:1;">
                <option value="">Any Plus</option>
              </select>
              <label style="display:flex;align-items:center;gap:3px;font-size:11px;white-space:nowrap;cursor:pointer;" title="Match any enchanted item (+1 or above)">
                <input type="checkbox" id="search-plus-any">Any+
              </label>
            </div>
          </div>
          <div class="field-group">
            <div class="field-label">Sockets</div>
            <select id="search-sockets" title="Filter by number of sockets on the item">
              <option value="">Any Sockets</option>
              <option value="0">No sockets</option>
              <option value="1">1 socket</option>
              <option value="2">2 sockets</option>
            </select>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr;gap:8px;">
          <div class="field-group">
            <div class="field-label">Max Price</div>
            <div class="price-input-wrap">
              <input type="text" id="search-maxprice" placeholder="No limit" autocomplete="off" title="Only show listings at or below this price (in gold)" />
              <span class="currency-hint">gold</span>
            </div>
          </div>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:6px;">
          <button class="btn-clear" id="search-clear-listings" title="Clear current results without resetting filters">Clear Listings</button>
          <button class="btn-clear" id="search-clear" title="Clear all filters and results">Clear</button>
        </div>
      </div>

      <div class="section-label calc-toggle" id="calc-toggle" title="+1 Item Decomposition Calculator">
        ⚡ Plus Calculator <span id="calc-arrow" style="font-size:9px;color:var(--gold-dim);margin-left:-4px;">▶</span>
      </div>
      <div id="calc-panel" style="display:none;">
        <div class="field-group" style="margin-bottom:8px;">
          <div class="field-label">How many +1 items do you have?</div>
          <input type="number" id="calc-count" min="1" placeholder="e.g. 6562" style="width:100%;" autocomplete="off" title="Enter the total count of +1 items to see what higher-plus items you can craft" />
        </div>
        <div id="calc-output">
          <div class="calc-table"><div class="calc-empty">Enter how many +1 items you have</div></div>
        </div>
      </div>

      <div class="section-label">Live Prices</div>
      <div class="price-row">
        <div class="price-card low">
          <div class="label">Lowest</div>
          <div class="value" id="price-low">—</div>
        </div>
        <div class="price-card">
          <div class="label">Average</div>
          <div class="value" id="price-avg">—</div>
        </div>
        <div class="price-card high">
          <div class="label">Highest</div>
          <div class="value" id="price-high">—</div>
        </div>
      </div>

      <div class="section-label">Results <span id="search-count" style="color:var(--text-dim)"></span></div>
      <div class="listings-wrap">
      <div class="listings-header">
        <span data-sort="AttributeName">Item</span>
        <span data-sort="SellerName">Seller</span>
        <span data-sort="QualityName" style="text-align:center">Quality</span>
        <span data-sort="pos" style="text-align:center">Loc</span>
        <span data-sort="Price" style="text-align:right" class="sort-asc">Price</span>
      </div>
      <div id="search-results">
        <div class="placeholder-text">Enter search terms above</div>
      </div>
      </div>

      <div class="minimap-wrap">
        <canvas id="search-minimap" width="240" height="160"></canvas>
      </div>
